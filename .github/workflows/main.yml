name: 🚀 Build NovaMesh APK (Fixed)

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:

    - name: 📥 Checkout
      uses: actions/checkout@v4

    - name: 📦 Unzip Project
      run: unzip novamesh.zip -d project

    - name: ☕ Setup JDK
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '17'

    - name: 🌐 Copy Web UI
      run: |
        mkdir -p project/novamesh/android/app/src/main/assets/webui/
        cp project/novamesh/web-ui/dashboard.html \
           project/novamesh/android/app/src/main/assets/webui/

    - name: 🔑 Generate SHA-1
      run: |
        cd project/novamesh/android
        chmod +x gradlew
        ./gradlew signingReport

    - name: 🛠️ Build APK
      run: |
        cd project/novamesh/android
        ./gradlew assembleDebug

    - name: 📤 Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: NovaMesh-APK
        path: project/novamesh/android/app/build/outputs/apk/debug/app-debug.apk
