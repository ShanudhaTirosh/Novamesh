name: NovaMesh Build

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:

  # ─────────────────────────────────────────────────────────────
  #  JOB 1  Unzip uploaded archive and push extracted files back
  # ─────────────────────────────────────────────────────────────
  unzip-and-push:
    name: Unzip and Push Source Files
    runs-on: ubuntu-latest
    permissions:
      contents: write
    outputs:
      zip_found: ${{ steps.detect.outputs.zip_found }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Detect zip at repo root
        id: detect
        run: |
          ZIP=$(find . -maxdepth 1 -name "*.zip" | head -n 1)
          if [ -n "$ZIP" ]; then
            echo "zip_found=true"  >> "$GITHUB_OUTPUT"
            echo "zip_path=$ZIP"   >> "$GITHUB_OUTPUT"
            echo "Found zip: $ZIP"
          else
            echo "zip_found=false" >> "$GITHUB_OUTPUT"
            echo "No zip at repo root - source already extracted"
          fi

      - name: Extract zip contents
        if: steps.detect.outputs.zip_found == 'true'
        run: |
          ZIP="${{ steps.detect.outputs.zip_path }}"
          echo "Extracting $ZIP ..."
          mkdir -p /tmp/extracted
          unzip -o "$ZIP" -d /tmp/extracted
          echo "Extracted files:"
          find /tmp/extracted -type f | sort

      - name: Copy extracted files to repo root
        if: steps.detect.outputs.zip_found == 'true'
        run: |
          # Exclude .github/ — workflow files are already in the repo and
          # the GITHUB_TOKEN is not allowed to push workflow file changes.
          rsync -av /tmp/extracted/ ./ \
            --exclude ".git/" \
            --exclude ".github/" \
            --exclude "*.zip"
          echo "Repo root after extraction:"
          find . -maxdepth 4 -not -path "./.git/*" -not -path "./.github/*" -type f | sort

      - name: Copy web-ui dashboard into Android assets
        if: steps.detect.outputs.zip_found == 'true'
        run: |
          ASSETS_DIR="android/app/src/main/assets/webui"
          mkdir -p "$ASSETS_DIR"
          if [ -f "web-ui/dashboard.html" ]; then
            cp -v "web-ui/dashboard.html" "$ASSETS_DIR/dashboard.html"
            echo "dashboard.html copied to $ASSETS_DIR"
          elif [ -f "$ASSETS_DIR/dashboard.html" ]; then
            echo "dashboard.html already in assets"
          else
            echo "WARNING: dashboard.html not found - web UI will be missing at runtime"
          fi

      - name: Remove zip from repo
        if: steps.detect.outputs.zip_found == 'true'
        run: |
          ZIP="${{ steps.detect.outputs.zip_path }}"
          rm -f "$ZIP"
          echo "Removed $ZIP"

      - name: Configure git identity
        if: steps.detect.outputs.zip_found == 'true'
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Stage commit and push extracted files
        if: steps.detect.outputs.zip_found == 'true'
        run: |
          git add -A
          if git diff --cached --quiet; then
            echo "Nothing changed after extraction - no commit needed"
          else
            CHANGED=$(git diff --cached --name-only | wc -l)
            echo "Committing $CHANGED changed file(s)..."
            git commit -m "Auto-extract: unzip NovaMesh source [skip ci]"
            echo "Pushing to ${{ github.ref_name }} ..."
            git push origin HEAD:${{ github.ref_name }}
            echo "Push complete"
          fi

      - name: Job summary
        if: always()
        run: |
          if [ "${{ steps.detect.outputs.zip_found }}" == "true" ]; then
            echo "Zip detected, extracted and pushed to repo." >> "$GITHUB_STEP_SUMMARY"
          else
            echo "No zip found - source already in repo." >> "$GITHUB_STEP_SUMMARY"
          fi

  # ─────────────────────────────────────────────────────────────
  #  JOB 2  Build debug APK
  # ─────────────────────────────────────────────────────────────
  build:
    name: Build APK
    runs-on: ubuntu-latest
    needs: unzip-and-push
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: ${{ github.ref_name }}

      - name: Verify android source structure
        run: |
          echo "=== Repo root ==="
          ls -la
          echo "=== android/ tree ==="
          if [ -d "android" ]; then
            find android -type f | sort
          else
            echo "ERROR: android/ directory not found"
            exit 1
          fi

      - name: Ensure dashboard.html is in assets
        run: |
          ASSETS="android/app/src/main/assets/webui"
          mkdir -p "$ASSETS"
          if [ -f "web-ui/dashboard.html" ] && [ ! -f "$ASSETS/dashboard.html" ]; then
            cp web-ui/dashboard.html "$ASSETS/dashboard.html"
            echo "Copied dashboard.html to assets"
          else
            echo "dashboard.html already in assets or not found in web-ui/"
          fi

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'gradle'

      - name: Regenerate gradle-wrapper.jar
        working-directory: android
        run: |
          GRADLE_VERSION="8.7"
          GRADLE_ZIP="gradle-${GRADLE_VERSION}-bin.zip"
          GRADLE_URL="https://services.gradle.org/distributions/${GRADLE_ZIP}"
          echo "Downloading Gradle ${GRADLE_VERSION}..."
          wget -q "$GRADLE_URL" -O "/tmp/${GRADLE_ZIP}"
          unzip -q "/tmp/${GRADLE_ZIP}" -d /tmp/
          echo "Generating wrapper JAR..."
          /tmp/gradle-${GRADLE_VERSION}/bin/gradle wrapper \
            --gradle-version "${GRADLE_VERSION}" \
            --distribution-type bin
          JAR_SIZE=$(stat -c%s gradle/wrapper/gradle-wrapper.jar)
          echo "gradle-wrapper.jar ready: ${JAR_SIZE} bytes"

      - name: Make gradlew executable
        working-directory: android
        run: chmod +x gradlew

      - name: Cache Gradle packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('android/**/*.gradle', 'android/**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Validate Gradle wrapper
        uses: gradle/actions/wrapper-validation@v3

      - name: Build debug APK
        working-directory: android
        run: |
          echo "Building debug APK..."
          ./gradlew assembleDebug \
            --no-daemon \
            --stacktrace \
            --warning-mode all
          echo "APK output:"
          find . -name "*.apk" -type f -exec ls -lh {} \;

      - name: Upload debug APK
        uses: actions/upload-artifact@v4
        with:
          name: NovaMesh-debug-${{ github.run_number }}
          path: android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30
          if-no-files-found: error

      - name: Build summary
        if: always()
        run: |
          echo "## NovaMesh Build Run #${{ github.run_number }}" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          DEBUG=$(find android -name "app-debug.apk" 2>/dev/null | head -n 1)
          if [ -n "$DEBUG" ]; then
            echo "| Debug APK | Built $(du -sh $DEBUG | cut -f1) |" >> "$GITHUB_STEP_SUMMARY"
          else
            echo "| Debug APK | Build failed |" >> "$GITHUB_STEP_SUMMARY"
          fi
        run: |
          if [ "${{ steps.detect.outputs.zip_found }}" == "true" ]; then
            echo "Zip detected, extracted and pushed to repo." >> "$GITHUB_STEP_SUMMARY"
          else
            echo "No zip found - source already in repo." >> "$GITHUB_STEP_SUMMARY"
          fi

  # ─────────────────────────────────────────────────────────────
  #  JOB 2  Build debug APK
  # ─────────────────────────────────────────────────────────────
  build:
    name: Build APK
    runs-on: ubuntu-latest
    needs: unzip-and-push
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: ${{ github.ref_name }}

      - name: Verify android source structure
        run: |
          echo "=== Repo root ==="
          ls -la
          echo "=== android/ tree ==="
          if [ -d "android" ]; then
            find android -type f | sort
          else
            echo "ERROR: android/ directory not found"
            exit 1
          fi

      - name: Ensure dashboard.html is in assets
        run: |
          ASSETS="android/app/src/main/assets/webui"
          mkdir -p "$ASSETS"
          if [ -f "web-ui/dashboard.html" ] && [ ! -f "$ASSETS/dashboard.html" ]; then
            cp web-ui/dashboard.html "$ASSETS/dashboard.html"
            echo "Copied dashboard.html to assets"
          else
            echo "dashboard.html already in assets or not found in web-ui/"
          fi

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'gradle'

      - name: Regenerate gradle-wrapper.jar
        working-directory: android
        run: |
          GRADLE_VERSION="8.7"
          GRADLE_ZIP="gradle-${GRADLE_VERSION}-bin.zip"
          GRADLE_URL="https://services.gradle.org/distributions/${GRADLE_ZIP}"
          echo "Downloading Gradle ${GRADLE_VERSION}..."
          wget -q "$GRADLE_URL" -O "/tmp/${GRADLE_ZIP}"
          unzip -q "/tmp/${GRADLE_ZIP}" -d /tmp/
          echo "Generating wrapper JAR..."
          /tmp/gradle-${GRADLE_VERSION}/bin/gradle wrapper \
            --gradle-version "${GRADLE_VERSION}" \
            --distribution-type bin
          JAR_SIZE=$(stat -c%s gradle/wrapper/gradle-wrapper.jar)
          echo "gradle-wrapper.jar ready: ${JAR_SIZE} bytes"

      - name: Make gradlew executable
        working-directory: android
        run: chmod +x gradlew

      - name: Cache Gradle packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('android/**/*.gradle', 'android/**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Validate Gradle wrapper
        uses: gradle/actions/wrapper-validation@v3

      - name: Build debug APK
        working-directory: android
        run: |
          echo "Building debug APK..."
          ./gradlew assembleDebug \
            --no-daemon \
            --stacktrace \
            --warning-mode all
          echo "APK output:"
          find . -name "*.apk" -type f -exec ls -lh {} \;

      - name: Upload debug APK
        uses: actions/upload-artifact@v4
        with:
          name: NovaMesh-debug-${{ github.run_number }}
          path: android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30
          if-no-files-found: error

      - name: Build summary
        if: always()
        run: |
          echo "## NovaMesh Build Run #${{ github.run_number }}" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          DEBUG=$(find android -name "app-debug.apk" 2>/dev/null | head -n 1)
          if [ -n "$DEBUG" ]; then
            echo "| Debug APK | Built $(du -sh $DEBUG | cut -f1) |" >> "$GITHUB_STEP_SUMMARY"
          else
            echo "| Debug APK | Build failed |" >> "$GITHUB_STEP_SUMMARY"
          fi
