name: 🚀 Build NovaMesh APK (Fixed)

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: 📥 Checkout
      uses: actions/checkout@v4

    - name: 📦 Unzip Project
      run: unzip novamesh.zip -d project

    - name: 📂 Show Project Structure (Debug)
      run: ls -R project

    - name: ☕ Setup JDK 17
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '17'

    - name: 📦 Setup Android SDK
      uses: android-actions/setup-android@v3

    - name: 📥 Install SDK 35
      run: |
        sdkmanager "platforms;android-35" "build-tools;35.0.0"

    - name: ⚙️ Setup Gradle Wrapper (7.6)
      run: |
        cd project/android
        ./gradlew wrapper --gradle-version 7.6 --distribution-type all
      shell: bash

    - name: 🔑 Make gradlew executable
      run: |
        cd project/android
        chmod +x gradlew

    - name: 🌐 Copy Web UI
      run: |
        mkdir -p project/android/app/src/main/assets/webui/
        cp project/web-ui/dashboard.html \
           project/android/app/src/main/assets/webui/

    - name: 🔑 Generate SHA-1
      run: |
        cd project/android
        ./gradlew signingReport

    - name: 🛠️ Build APK
      run: |
        cd project/android
        ./gradlew assembleDebug

    - name: 📤 Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: NovaMesh-APK
        path: project/android/app/build/outputs/apk/debug/app-debug.apk
