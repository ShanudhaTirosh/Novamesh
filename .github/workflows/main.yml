name: 🚀 Build NovaMesh APK (Fixed Final)

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:

    - name: 📥 Checkout
      uses: actions/checkout@v4

    - name: 📦 Unzip Project
      run: unzip novamesh.zip -d project

    - name: ☕ Setup JDK
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '17'

    - name: 📦 Setup Android SDK
      uses: android-actions/setup-android@v3

    - name: 📥 Install SDK
      run: |
        sdkmanager "platforms;android-35" "build-tools;35.0.0"

    - name: 🧰 Install Gradle
      run: sudo apt-get update && sudo apt-get install -y gradle

     - name: ⚙️ Generate Wrapper
  run: |
    cd project/android
    gradle wrapper

    - name: 🔑 Make gradlew executable
  run: |
    cd project/android
    chmod +x gradlew

    - name: 🌐 Copy Web UI
  run: |
    mkdir -p project/android/app/src/main/assets/webui/
    cp project/web-ui/dashboard.html \
       project/android/app/src/main/assets/webui/

    - name: 🛠️ Build APK
  run: |
    cd project/android
    ./gradlew assembleDebug

      - name: 📤 Upload APK
    uses: actions/upload-artifact@v4
    with:
     name: NovaMesh-APK
      path: project/android/app/build/outputs/apk/debug/app-debug.apk
     
       - name: 📂 Show Structure
  run: ls -R project
