name: 🚀 Build NovaMesh APK (Auto-Generate)

on:
  push:
    branches: ["main"]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: 📥 Checkout
      uses: actions/checkout@v4

    - name: 📦 Unzip Project
      run: unzip novamesh.zip -d project

    - name: 📂 Show Project Structure (Debug)
      run: ls -R project

    - name: ☕ Setup JDK 17
      uses: actions/setup-java@v4
      with:
        distribution: temurin
        java-version: '17'

    - name: 📦 Setup Android SDK
      uses: android-actions/setup-android@v3

    - name: 📥 Install SDK 35
      run: |
        sdkmanager "platforms;android-35" "build-tools;35.0.0"

    - name: 🧰 Install Gradle 7.6
      run: |
        wget https://services.gradle.org/distributions/gradle-7.6-bin.zip
        unzip gradle-7.6-bin.zip -d $HOME/gradle
        echo "$HOME/gradle/gradle-7.6/bin" >> $GITHUB_PATH
        gradle -v

    - name: ⚙️ Prepare Gradle Build
      run: |
        cd project/android || mkdir -p project/android && cd project/android
        # Generate wrapper if missing
        if [ ! -f gradlew ]; then
          gradle wrapper --gradle-version 7.6 --distribution-type all
        fi
        # Create settings.gradle if missing
        if [ ! -f settings.gradle ]; then
          echo "rootProject.name = 'NovaMesh'" > settings.gradle
        fi
        # Create basic build.gradle if missing
        if [ ! -f build.gradle ]; then
          cat <<EOL > build.gradle
plugins {
    id 'com.android.application' version '7.4.1' apply false
}

allprojects {
    repositories {
        google()
        mavenCentral()
    }
}
EOL
        fi

    - name: 🌐 Copy Web UI
      run: |
        mkdir -p project/android/app/src/main/assets/webui/
        cp project/web-ui/dashboard.html \
           project/android/app/src/main/assets/webui/ || echo "No web UI found, skipping"

    - name: 🔑 Generate SHA-1
      run: |
        cd project/android
        gradle signingReport || echo "Signing report skipped"

    - name: 🛠️ Build APK
      run: |
        cd project/android
        gradle assembleDebug

    - name: 📤 Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: NovaMesh-APK
        path: project/android/app/build/outputs/apk/debug/app-debug.apk || echo "APK not found"
