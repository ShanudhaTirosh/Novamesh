name: 🚀 Build NovaMesh APK (Full CI)

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:   # allows manual run

jobs:
  build:
    runs-on: ubuntu-latest

    steps:

    # 1️⃣ Checkout repo
    - name: 📥 Checkout Repository
      uses: actions/checkout@v4

    # 2️⃣ Unzip your project
    - name: 📦 Extract NovaMesh ZIP
      run: unzip novamesh.zip -d project

    # 3️⃣ Setup Java (required for Android build)
    - name: ☕ Setup JDK 17
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '17'

    # 4️⃣ Copy Web UI into Android assets
    - name: 🌐 Copy Web UI
      run: |
        mkdir -p project/HotspotRouterOS/android/app/src/main/assets/webui/
        cp project/HotspotRouterOS/web-ui/dashboard.html \
           project/HotspotRouterOS/android/app/src/main/assets/webui/

    # 5️⃣ Show SHA-1 (for Firebase setup)
    - name: 🔑 Generate SHA-1 (Firebase)
      run: |
        cd project/HotspotRouterOS/android
        chmod +x gradlew
        ./gradlew signingReport

    # 6️⃣ Build Debug APK
    - name: 🛠️ Build Debug APK
      run: |
        cd project/HotspotRouterOS/android
        ./gradlew assembleDebug

    # 7️⃣ Upload APK as artifact
    - name: 📤 Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: NovaMesh-Debug-APK
        path: project/HotspotRouterOS/android/app/build/outputs/apk/debug/app-debug.apk
